name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create assets folder and copy HTML
        run: |
          mkdir -p android/app/src/main/assets
          cp android/app/src/main/assets/index.html android/app/src/main/assets/index.html 2>/dev/null || true
          ls -la android/app/src/main/assets/

      - name: Build APK
        run: cd android && gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medgulf-hse-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk